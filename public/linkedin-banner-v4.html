<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LinkedIn Banner v4 — Light</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 1584px; height: 396px;
      overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #0f172a;
      background: #ffffff;
    }
    .banner {
      position: relative;
      width: 100%; height: 100%;
      background:
        radial-gradient(ellipse at 13% 85%, rgba(59,130,246,0.08) 0%, transparent 40%),
        radial-gradient(ellipse at 75% 25%, rgba(139,92,246,0.06) 0%, transparent 45%),
        radial-gradient(ellipse at 95% 90%, rgba(6,182,212,0.05) 0%, transparent 35%),
        linear-gradient(135deg, #f8fafc 0%, #eef2ff 40%, #f0f9ff 70%, #faf5ff 100%);
    }

    /* Subtle dot pattern */
    .grid {
      position: absolute; inset: 0;
      background-image: radial-gradient(rgba(148,163,184,0.2) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(ellipse at 13% 90%, black 12%, transparent 50%);
      -webkit-mask-image: radial-gradient(ellipse at 13% 90%, black 12%, transparent 50%);
    }

    /* Decorative soft shapes */
    .blob1 {
      position: absolute;
      right: 120px; top: -40px;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139,92,246,0.06) 0%, transparent 70%);
    }
    .blob2 {
      position: absolute;
      right: 350px; bottom: -60px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,0.05) 0%, transparent 70%);
    }

    /* Photo zone arcs — soft light colors */
    .hub-glow {
      position: absolute;
      left: 110px; top: 235px;
      width: 190px; height: 190px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, rgba(139,92,246,0.03) 50%, transparent 70%);
    }

    svg.arcs {
      position: absolute;
      left: 0; top: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* Nodes — softer, pastel-ish */
    .node {
      position: absolute;
      border-radius: 50%;
      opacity: 0.7;
    }
    .node.blue { background: #93c5fd; box-shadow: 0 0 8px rgba(147,197,253,0.4); }
    .node.purple { background: #c4b5fd; box-shadow: 0 0 8px rgba(196,181,253,0.4); }
    .node.cyan { background: #67e8f9; box-shadow: 0 0 8px rgba(103,232,249,0.3); }
    .node.sm { width: 5px; height: 5px; }
    .node.md { width: 8px; height: 8px; }
    .node.lg { width: 11px; height: 11px; }

    /* Content */
    .content {
      position: absolute;
      left: 400px; top: 0;
      right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 36px 72px 36px 20px;
      gap: 14px;
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #059669;
      padding: 5px 14px;
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(5,150,105,0.2);
      border-radius: 999px;
    }
    .pill .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 6px rgba(16,185,129,0.5);
    }

    .stats {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .stat { text-align: center; }
    .stat .num {
      font-size: 26px;
      font-weight: 800;
      color: #1e293b;
      line-height: 1;
      letter-spacing: -0.5px;
    }
    .stat .label {
      font-size: 9px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 3px;
    }
    .stat-divider {
      width: 1px; height: 32px;
      background: linear-gradient(to bottom, transparent, #cbd5e1, transparent);
    }

    h1 {
      font-size: 42px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1px;
      margin: 0;
      color: #0f172a;
    }
    .accent {
      background: linear-gradient(90deg, #3b82f6, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .identity .name {
      font-size: 18px;
      font-weight: 700;
      color: #1e293b;
    }
    .identity .role {
      font-size: 12px;
      font-weight: 500;
      color: #64748b;
      margin-top: 1px;
    }
    .url-badge {
      font-size: 11px;
      font-weight: 600;
      color: #3b82f6;
      padding: 6px 14px;
      background: rgba(59,130,246,0.06);
      border: 1px solid rgba(59,130,246,0.15);
      border-radius: 999px;
    }

    /* Thin decorative line */
    .horizon {
      position: absolute;
      left: 320px; right: 80px;
      top: 52%;
      height: 1px;
      background: linear-gradient(90deg, rgba(59,130,246,0.15), rgba(139,92,246,0.08) 50%, transparent 85%);
    }

    /* Decorative bottom border accent */
    .bottom-accent {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 3px;
      background: linear-gradient(90deg, #3b82f6 0%, #6366f1 25%, #8b5cf6 50%, #06b6d4 75%, transparent 100%);
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="grid"></div>
    <div class="blob1"></div>
    <div class="blob2"></div>
    <div class="hub-glow"></div>

    <!-- Soft arcs around photo position -->
    <svg class="arcs" viewBox="0 0 1584 396" fill="none">
      <circle cx="200" cy="340" r="105" stroke="rgba(59,130,246,0.12)" stroke-width="1.5" stroke-dasharray="6 10"/>
      <circle cx="200" cy="340" r="150" stroke="rgba(139,92,246,0.08)" stroke-width="1" stroke-dasharray="4 14"/>
      <circle cx="200" cy="340" r="205" stroke="rgba(6,182,212,0.06)" stroke-width="0.8" stroke-dasharray="3 18"/>

      <!-- Flow lines -->
      <path d="M 305 280 C 480 260, 650 200, 950 130" stroke="url(#f1)" stroke-width="1" opacity="0.5"/>
      <path d="M 320 310 C 480 295, 620 260, 860 220" stroke="url(#f2)" stroke-width="0.8" opacity="0.35"/>
      <path d="M 295 345 C 420 335, 560 320, 800 305" stroke="url(#f3)" stroke-width="0.6" opacity="0.25"/>

      <defs>
        <linearGradient id="f1" x1="305" y1="280" x2="950" y2="130">
          <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="f2" x1="320" y1="310" x2="860" y2="220">
          <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="f3" x1="295" y1="345" x2="800" y2="305">
          <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2"/>
          <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
        </linearGradient>
      </defs>
    </svg>

    <!-- Soft colored nodes -->
    <div class="node md blue" style="left:355px; top:268px;"></div>
    <div class="node sm purple" style="left:490px; top:248px;"></div>
    <div class="node sm cyan" style="left:620px; top:228px;"></div>
    <div class="node sm blue" style="left:375px; top:325px;"></div>
    <div class="node md purple" style="left:315px; top:290px;"></div>
    <div class="node sm cyan" style="left:540px; top:305px;"></div>
    <div class="node sm blue" style="left:710px; top:190px; opacity:0.4;"></div>

    <div class="horizon"></div>
    <div class="bottom-accent"></div>

    <div class="content">
      <div class="top-row">
        <div class="pill">
          <span class="dot"></span>
          Available for Freelance
        </div>
        <div class="stats">
          <div class="stat"><div class="num">4+</div><div class="label">Years</div></div>
          <div class="stat-divider"></div>
          <div class="stat"><div class="num">35+</div><div class="label">Projects</div></div>
          <div class="stat-divider"></div>
          <div class="stat"><div class="num">5M+</div><div class="label">Rows Daily</div></div>
        </div>
      </div>

      <h1>I turn manual data &amp; ops work into <span class="accent">autonomous AI workflows</span>.</h1>

      <div class="bottom-row">
        <div class="identity">
          <div class="name">Surya Prakash Manubolu</div>
          <div class="role">Data &amp; AI Automation Consultant · Claude Code · Remote-first</div>
        </div>
        <div class="url-badge">suryaprakash-sp.github.io/portfolio</div>
      </div>
    </div>
  </div>
</body>
</html>

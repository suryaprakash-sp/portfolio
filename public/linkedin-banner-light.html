<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LinkedIn Banner — Light & Simple</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 1584px; height: 396px;
      overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #0f172a;
      background: #ffffff;
    }
    .banner {
      position: relative;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 60%, #eff6ff 100%);
      box-sizing: border-box;
      padding: 44px 120px 44px 500px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 22px;
    }
    .accent-bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 5px;
      background: linear-gradient(180deg, #3b82f6 0%, #6366f1 100%);
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #059669;
      padding: 9px 20px;
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      border-radius: 999px;
      width: fit-content;
    }
    .pill .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #10b981;
    }
    h1 {
      font-size: 50px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1.2px;
      margin: 0;
      color: #0f172a;
      max-width: 960px;
    }
    .accent {
      color: #3b82f6;
    }
    .url {
      font-size: 18px;
      font-weight: 600;
      color: #3b82f6;
      padding: 11px 22px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 999px;
      width: fit-content;
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="accent-bar"></div>

    <div class="pill">
      <span class="dot"></span>
      Available for Freelance
    </div>

    <h1>I turn manual data &amp; ops work into<br><span class="accent">autonomous AI workflows.</span></h1>

    <div class="url">suryaprakash-sp.github.io/portfolio</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OG Image — Light</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 1200px; height: 630px;
      overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #0f172a;
      background: #ffffff;
    }
    .card {
      position: relative;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 55%, #eff6ff 100%);
      box-sizing: border-box;
      padding: 48px 90px 120px 110px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .accent-bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 6px;
      background: linear-gradient(180deg, #3b82f6 0%, #6366f1 100%);
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #059669;
      padding: 10px 22px;
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      border-radius: 999px;
      width: fit-content;
    }
    .pill .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #10b981;
    }
    h1 {
      font-size: 62px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1.5px;
      margin: 24px 0 0 0;
      color: #0f172a;
      max-width: 980px;
    }
    .accent {
      color: #3b82f6;
    }
    .stats {
      display: flex;
      align-items: center;
      gap: 40px;
      margin-top: 28px;
    }
    .stat { display: flex; flex-direction: column; }
    .stat .num {
      font-size: 38px;
      font-weight: 800;
      color: #1e293b;
      line-height: 1;
      letter-spacing: -1px;
    }
    .stat .label {
      font-size: 14px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 8px;
    }
    .stat-divider {
      width: 1px; height: 48px;
      background: linear-gradient(to bottom, transparent, #cbd5e1, transparent);
    }
    .identity-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .identity .name {
      font-size: 22px;
      font-weight: 700;
      color: #1e293b;
      letter-spacing: -0.3px;
    }
    .identity .role {
      font-size: 15px;
      font-weight: 500;
      color: #64748b;
      margin-top: 4px;
    }
    .url {
      font-size: 16px;
      font-weight: 600;
      color: #3b82f6;
      padding: 10px 20px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="accent-bar"></div>

    <div>
      <div class="pill">
        <span class="dot"></span>
        Available for Freelance
      </div>

      <h1>I turn manual data &amp; ops work into<br><span class="accent">autonomous AI workflows.</span></h1>

      <div class="stats">
        <div class="stat"><span class="num">85K+</span><span class="label">Students Served</span></div>
        <div class="stat-divider"></div>
        <div class="stat"><span class="num">20+</span><span class="label">ETL Pipelines</span></div>
        <div class="stat-divider"></div>
        <div class="stat"><span class="num">20h</span><span class="label">Saved / Week</span></div>
        <div class="stat-divider"></div>
        <div class="stat"><span class="num">4+</span><span class="label">Years EdTech</span></div>
      </div>
    </div>

    <div class="identity-row">
      <div class="identity">
        <div class="name">Surya Prakash Manubolu</div>
        <div class="role">Data &amp; AI Automation Consultant · Claude Code · Remote-first</div>
      </div>
      <div class="url">suryaprakash-sp.github.io/portfolio</div>
    </div>
  </div>
</body>
</html>
